[profile.default]
solc_version = "0.8.19"
evm_version = "shanghai"
optimizer = true
optimizer_runs = 200
sender = "0xf39fd6e51aad88f6f4ce6ab8827279cfffb92266"
src = 'src'
script = 'src'
test = 'test'
out = 'out'
allow_paths = ["../contracts"]
