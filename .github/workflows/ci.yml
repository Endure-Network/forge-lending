name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  contracts-build:
    name: forge build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable
      - name: Forge version
        run: forge --version
      - name: Cache Foundry build artifacts
        uses: actions/cache@v4
        with:
          path: |
            packages/contracts/out
            packages/contracts/cache
          key: foundry-${{ runner.os }}-${{ hashFiles('packages/contracts/foundry.toml', 'packages/contracts/remappings.txt', 'packages/contracts/src/**/*.sol', 'packages/contracts/lib/**/*.sol', 'packages/contracts/test/**/*.sol') }}
          restore-keys: |
            foundry-${{ runner.os }}-
      - name: Build contracts
        run: forge build --root packages/contracts

  contracts-test:
    name: forge test + gas snapshot
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable
      - name: Forge version
        run: forge --version
      - name: Cache Foundry build artifacts
        uses: actions/cache@v4
        with:
          path: |
            packages/contracts/out
            packages/contracts/cache
          key: foundry-${{ runner.os }}-${{ hashFiles('packages/contracts/foundry.toml', 'packages/contracts/remappings.txt', 'packages/contracts/src/**/*.sol', 'packages/contracts/lib/**/*.sol', 'packages/contracts/test/**/*.sol') }}
          restore-keys: |
            foundry-${{ runner.os }}-
      - name: Check behavior-mapping table covers all deletions
        run: bash scripts/check-test-mapping.sh
      - name: Run all Foundry tests (unit + integration + invariant)
        run: forge test --root packages/contracts -v
      - name: Gas snapshot regression check
        run: ./scripts/gas-snapshot-check.sh

  forbidden-patterns:
    name: forbidden-pattern scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Scan src/ for stripped-contract identifiers
        run: ./scripts/check-forbidden-patterns.sh

  stance-b-audit:
    name: Stance B byte-identical audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Compare vendored src/ against upstream contracts/
        run: bash scripts/check-stance-b.sh

  e2e-smoke:
    name: live-chain E2E (anvil)
    runs-on: ubuntu-latest
    needs: [contracts-build]
    steps:
      - uses: actions/checkout@v6
      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable
      - name: Cache Foundry build artifacts
        uses: actions/cache@v4
        with:
          path: |
            packages/contracts/out
            packages/contracts/cache
            packages/deploy/out
            packages/deploy/cache
          key: foundry-${{ runner.os }}-${{ hashFiles('packages/contracts/foundry.toml', 'packages/contracts/remappings.txt', 'packages/deploy/foundry.toml', 'packages/deploy/remappings.txt', 'packages/contracts/src/**/*.sol', 'packages/contracts/lib/**/*.sol', 'packages/deploy/src/**/*.sol') }}
          restore-keys: |
            foundry-${{ runner.os }}-
      - name: Start anvil in background
        run: |
          anvil --silent --disable-code-size-limit --gas-limit 999999999 > /tmp/anvil.log 2>&1 &
          for i in {1..10}; do
            if curl -s -X POST http://localhost:8545 \
                 -H "Content-Type: application/json" \
                 --data '{"jsonrpc":"2.0","method":"eth_chainId","params":[],"id":1}' \
                 | grep -q '"result"'; then
              echo "anvil up"
              break
            fi
            sleep 1
          done
      - name: Deploy to local anvil
        run: |
          cd packages/deploy
          mkdir -p broadcast
          forge script src/DeployLocal.s.sol \
            --rpc-url http://localhost:8545 \
            --broadcast \
            --code-size-limit 999999 \
            --private-key 0xac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80
      - name: Run E2E smoke test
        run: ./scripts/e2e-smoke.sh

  contracts-hardhat-build:
    name: hardhat compile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: 10.28.1
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Hardhat compile
        run: pnpm --filter @endure/contracts hardhat compile

  contracts-hardhat-test:
    name: hardhat test
    runs-on: ubuntu-latest
    needs: [contracts-hardhat-build]
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: 10.28.1
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Link hardhat libs
        run: bash packages/contracts/scripts/link-hardhat-libs.sh
      - name: Run Hardhat tests
        run: pnpm --filter @endure/contracts hardhat test
      - name: Check skip-list drift
        run: bash scripts/check-hardhat-skips.sh

  pnpm-workspace:
    name: pnpm workspace (non-contracts)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: 10.28.1
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Run workspace tests
        run: pnpm -r test
